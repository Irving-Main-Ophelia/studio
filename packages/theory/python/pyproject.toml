[project]
name = "stockhausen-theory"
version = "0.0.1"
description = "Music-theory analyzers + validators for Stockhausen. Wraps music21 with typed analyzers, Pillar-2 transposition with enharmonic respelling, and Pillar-8 explainers."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "UNLICENSED" }
authors = [{ name = "Irving Hernandez" }]

dependencies = ["music21>=9.3"]

[dependency-groups]
dev = ["ruff>=0.8", "mypy>=1.13", "pytest>=8.3"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["stockhausen_theory"]

[tool.hatch.build.targets.wheel.force-include]
"stockhausen_theory/py.typed" = "stockhausen_theory/py.typed"

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "A", "C4", "RET", "SIM", "TID", "ARG", "PL"]
ignore = ["PLR0913", "PLR0912"]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["PLR2004"]

[tool.mypy]
python_version = "3.12"
strict = true
# music21's type stubs are incomplete and misreport common attributes such
# as Part.partName and Measure.number. We allow the theory wrappers to call
# into these dynamic attributes; correctness is enforced via the runtime
# test suite (tests/test_analyzers.py et al.) instead of mypy.
disable_error_code = ["attr-defined", "no-untyped-call", "unused-ignore", "name-defined"]

[[tool.mypy.overrides]]
module = ["music21", "music21.*"]
ignore_missing_imports = true

[tool.pytest.ini_options]
pythonpath = ["."]
